services:
  db:
    image: postgres:16
    container_name: saas_agendamentos_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_agendamentos
    volumes:
      - saas_agendamentos_pg:/var/lib/postgresql/data

volumes:
  saas_agendamentos_pg: